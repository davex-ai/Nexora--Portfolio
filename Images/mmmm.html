<!DOCTYPE html>
<html>
<head>
  <title>My Social Icons</title>
  <!-- Include Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Basic styling for spacing */
    .social-icons a {
      margin: 0 10px; /* Adds space between icons */
      text-decoration: none; /* Removes underline from links */
      color: #333; /* Sets icon color */
      font-size: 24px; /* Adjusts icon size */
    }
    .social-icons a:hover {
      color: #007bff; /* Changes color on hover */
    }
  </style>
</head>
<body>

  <div class="social-icons">
    <a href="https://www.facebook.com/yourprofile" target="_blank">hii<i class="fab fa-facebook"></i></a>
    <a href="https://www.twitter.com/yourprofile" target="_blank"><i class="fab fa-twitter"></i></a>
    <a href="https://www.instagram.com/yourprofile" target="_blank"><i class="fab fa-instagram"></i></a>
  </div>

</body>
</html>
